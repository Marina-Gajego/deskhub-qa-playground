name: Web E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  cypress-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Root Dependencies
        run: npm install

      - name: Install Project Dependencies
        run: npm run install:all

      - name: Run Web E2E Tests
        uses: cypress-io/github-action@v6
        with:
          # Inicia backend E frontend em paralelo
          start: npm run start:backend, npm run dev:frontend
          # Aguarda as portas do backend e do frontend abrirem
          wait-on: 'tcp:localhost:3001, tcp:localhost:5173'
          # Roda apenas os specs da UI Web
          spec: cypress/e2e/web/**/*.cy.js
