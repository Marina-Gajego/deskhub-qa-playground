name: API Tests

on:
  workflow_dispatch:

jobs:
  cypress-api:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Root Dependencies
        run: npm install

      - name: Install Project Dependencies
        run: npm run install:all

      - name: Run API Tests
        uses: cypress-io/github-action@v6
        with:
          start: npm run start:backend
          wait-on: 'http://127.0.0.1:3001/api/docs/openapi.json'
          spec: cypress/e2e/api/**/*.cy.js
        env:
          CYPRESS_BASE_URL: http://127.0.0.1:3001
          # Pula testes de bugs conhecidos para nao falhar a pipeline
          CYPRESS_SKIP_KNOWN_BUGS: 'true'